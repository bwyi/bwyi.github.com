<section class="publication-content">

  <span aria-hidden="true">|</span>
  <button type="button" data-language="fr" aria-pressed="false">FR</button>
</div>

<h2 data-i18n="page.title">Publications</h2>
<div class="gray-line"></div>

<div class="publication-tools" aria-label="Publication filters" data-i18n-aria="filters.label">

  <div class="publication-filter-row" role="group" aria-label="Publication type" data-i18n-aria="filters.typeLabel">

    <button type="button" class="publication-filter-button" data-publication-type="preprint" aria-pressed="false" data-i18n="filters.preprints">Preprints</button>
    <button type="button" class="publication-filter-button" data-publication-type="journal" aria-pressed="false" data-i18n="filters.journals">Journals</button>
    <button type="button" class="publication-filter-button" data-publication-type="conference" aria-pressed="false" data-i18n="filters.conferences">Conferences</button>
    <select class="publication-year-select" id="publication-year" aria-label="Publication year" data-i18n-aria="filters.yearLabel"></select>
  </div>

  <div class="publication-summary-row">
    <span id="publication-summary" aria-live="polite"></span>
  </div>
</div>

<div id="pub-container"></div>
<div id="error-box" class="error"></div>
