<meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta property="og:locale:alternate" content="fr_CA">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Academic Calendar | Bowen Yi">
  <meta name="twitter:description" content="Public academic availability calendar at Polytechnique Montréal.">

  <link rel="stylesheet" href="stylesheets/styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="assets/css/academicons.min.css">
  <link rel="stylesheet" href="assets/css/academicons.css">
  <link rel="stylesheet" href="stylesheets/site-theme.css?v=20260717k">
  <link rel="stylesheet" href="stylesheets/bilingual-page.css">
  <link rel="stylesheet" href="stylesheets/pages/calendar.css?v=20260717a">
</head>

<body>
<div class="wrapper">

  <!-- ================= LEFT SIDEBAR ================= -->
  <header data-site-header></header>
  <script src="javascripts/site-shell.js"></script>

  <!-- ================= MAIN CONTENT ================= -->
  <section data-bilingual-root>

    <h2 data-en="Calendar" data-fr="Calendrier">Calendar</h2>
    <div class="gray-line"></div>

    <p class="justified-text" data-en="My public academic calendar shows availability only. Event details are intentionally hidden." data-fr="Mon calendrier académique public affiche uniquement mes disponibilités. Les détails des événements sont volontairement masqués.">
      My public academic calendar shows availability only. Event details
      are intentionally hidden.
    </p>

    <div class="availability-calendar" aria-label="Availability calendar" data-aria-en="Availability calendar" data-aria-fr="Calendrier des disponibilités">
      <div class="calendar-toolbar">
        <div class="calendar-nav">
          <button type="button" id="calendar-prev" aria-label="Previous week" data-aria-en="Previous week" data-aria-fr="Semaine précédente">&lsaquo;</button>
          <button type="button" id="calendar-next" aria-label="Next week" data-aria-en="Next week" data-aria-fr="Semaine suivante">&rsaquo;</button>
          <button type="button" id="calendar-today" data-en="Today" data-fr="Aujourd’hui">Today</button>
        </div>
        <div id="calendar-title" class="calendar-title"></div>
      </div>

      <div id="calendar-status" class="calendar-status" data-en="Loading calendar..." data-fr="Chargement du calendrier…">Loading calendar...</div>
      <div id="calendar-week" class="calendar-week"></div>
      <div class="calendar-footer">
        <div class="calendar-legend">
          <span class="calendar-privacy-label" data-en="Availability only" data-fr="Disponibilités uniquement">Availability only</span>
          <span class="calendar-legend-item"><i class="calendar-legend-dot" aria-hidden="true"></i><span data-en="Busy" data-fr="Occupé">Busy</span></span>
          <span class="calendar-legend-item"><i class="calendar-legend-dot is-tentative" aria-hidden="true"></i><span data-en="Tentative" data-fr="Provisoire">Tentative</span></span>
          <span class="calendar-legend-item"><i class="calendar-legend-dot is-now" aria-hidden="true"></i><span data-en="Now" data-fr="Maintenant">Now</span></span>
        </div>
        <span id="calendar-timezone"></span>
      </div>
    </div>

    <footer class="site-footer-unified" data-site-footer></footer>

  </section>
</div>
<script src="calendar-events.js"></script>
<script src="javascripts/bilingual-page.js"></script>
<script src="javascripts/pages/calendar.js?v=20260717a"></script>
</body>
</html>
